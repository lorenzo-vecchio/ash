name: CI

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint & test ────────────────────────────────────────────────────────────
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Tests
        run: cargo test --workspace

  # ── Build release binaries (only on version tags) ──────────────────────────
  build:
    name: Build (${{ matrix.name }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: ash-linux-x86_64

          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ash-macos-arm64

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ash-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      # musl toolchain for fully static Linux binary
      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --bin ash --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ash ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 30

  # ── Package VS Code extension ───────────────────────────────────────────────
  vscode:
    name: Package VS Code extension
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Package extension
        working-directory: ash-vscode
        run: |
          npm install -g @vscode/vsce
          vsce package --no-dependencies

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ash-vscode
          path: ash-vscode/*.vsix
          retention-days: 30

  # ── Create GitHub Release on version tags ──────────────────────────────────
  release:
    name: Release
    needs: [build, vscode]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archives
        run: |
          for dir in artifacts/ash-linux-x86_64 artifacts/ash-macos-arm64 artifacts/ash-macos-x86_64; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            chmod +x "$dir/$name"
            tar -czf "${name}.tar.gz" -C "$dir" "$name"
          done
          # copy vsix as-is
          cp artifacts/ash-vscode/*.vsix . 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.vsix
          generate_release_notes: true
          body: |
            ## Install

            **macOS / Linux (one command):**
            ```sh
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sh
            ```

            **Manual download:** grab the right archive below, extract, and move `ash` to a directory on your `$PATH`.

            | Platform | File |
            |---|---|
            | Linux x86_64 | `ash-linux-x86_64.tar.gz` |
            | macOS Apple Silicon | `ash-macos-arm64.tar.gz` |
            | macOS Intel | `ash-macos-x86_64.tar.gz` |

            ## VS Code extension

            Download `ash-language-*.vsix` below and install it with:
            ```sh
            code --install-extension ash-language-*.vsix
            ```
